<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>智能客服 - 酒店住房管理系统</title>
		<link rel="stylesheet" type="text/css" href="../../elementui/elementui.css" />
		<style>
			html,body,#app {
				height: 100%;
			}
			body {
				margin: 0;
				background: #f5f5f5;
			}
			.chat-container {
				height: 100%;
				display: flex;
				flex-direction: column;
			}
			.chat-header {
				background: linear-gradient(135deg, #409eff, #66b1ff);
				color: #fff;
				padding: 12px 16px;
				display: flex;
				align-items: center;
				justify-content: space-between;
			}
			.chat-header-title {
				display: flex;
				align-items: center;
				font-size: 16px;
				font-weight: 500;
			}
			.online-dot {
				width: 8px;
				height: 8px;
				background: #67c23a;
				border-radius: 50%;
				margin-right: 8px;
			}
			.chat-content {
				overflow-y: auto;
				margin: 0;
				padding: 16px;
				flex: 1;
				background: #f5f5f5;
			}
			.left-content {
				display: flex;
				justify-content: flex-start;
				margin-bottom: 16px;
			}
			.right-content {
				display: flex;
				justify-content: flex-end;
				margin-bottom: 16px;
			}
			.message-bubble {
				max-width: 70%;
				padding: 12px 16px;
				border-radius: 12px;
				font-size: 14px;
				line-height: 1.6;
				box-shadow: 0 1px 2px rgba(0,0,0,0.1);
			}
			.message-bubble.user {
				background: #409eff;
				color: #fff;
				border-bottom-right-radius: 4px;
			}
			.message-bubble.admin {
				background: #fff;
				color: #333;
				border-bottom-left-radius: 4px;
			}
			.message-bubble.ai {
				background: linear-gradient(135deg, #e8f4fc, #d4edfc);
				color: #333;
				border-bottom-left-radius: 4px;
				border-left: 3px solid #409eff;
			}
			.message-time {
				font-size: 12px;
				color: #999;
				margin-top: 4px;
				text-align: right;
			}
			.quick-questions {
				padding: 8px 16px;
				background: #fff;
				border-top: 1px solid #eee;
			}
			.quick-questions-title {
				font-size: 12px;
				color: #999;
				margin-bottom: 8px;
			}
			.quick-question {
				display: inline-block;
				padding: 4px 12px;
				margin: 0 8px 8px 0;
				background: #f0f2f5;
				border-radius: 16px;
				font-size: 12px;
				color: #409eff;
				cursor: pointer;
				transition: all 0.2s;
			}
			.quick-question:hover {
				background: #409eff;
				color: #fff;
			}
			.chat-input-area {
				background: #fff;
				padding: 12px 16px;
				display: flex;
				align-items: center;
				border-top: 1px solid #eee;
			}
			.chat-input-area .el-input {
				flex: 1;
				margin-right: 12px;
			}
			.transfer-btn {
				margin-left: 8px;
			}
			.welcome-message {
				text-align: center;
				padding: 20px;
			}
			.welcome-message .icon {
				font-size: 48px;
				margin-bottom: 12px;
			}
			.welcome-message .text {
				color: #666;
				font-size: 14px;
				line-height: 1.8;
			}
		</style>
	</head>
	<body style="overflow-y: hidden;overflow-x: hidden;">
		<div id="app">
			<div class="chat-container">
				<!-- 聊天头部 -->
				<div class="chat-header">
					<div class="chat-header-title">
						<span class="online-dot"></span>
						<span>智能客服小智</span>
					</div>
					<el-button size="mini" type="text" style="color:#fff" @click="transferHuman">转人工</el-button>
				</div>
				
				<!-- 聊天内容 -->
				<div class="chat-content" ref="chatContent">
					<!-- 欢迎消息 -->
					<div v-if="dataList.length === 0" class="welcome-message">
						<div class="icon">🤖</div>
						<div class="text" v-html="greeting"></div>
					</div>
					
					<div v-bind:key="item.id" v-for="item in dataList">
						<!-- 用户提问（显示在右边） -->
						<div v-if="item.ask" class="right-content">
							<div class="message-bubble user">{{item.ask}}</div>
						</div>
						<!-- 客服回复（显示在左边） -->
						<div v-if="item.reply" class="left-content">
							<div :class="['message-bubble', item.reply.startsWith('[AI小智]') ? 'ai' : 'admin']">
								{{item.reply.replace('[AI小智] ', '')}}
							</div>
						</div>
					</div>
				</div>
				
				<!-- 快捷问题 -->
				<div class="quick-questions" v-if="hotQuestions.length > 0">
					<div class="quick-questions-title">猜你想问：</div>
					<span class="quick-question" v-for="q in hotQuestions.slice(0,5)" :key="q.id" @click="askQuestion(q.wenti)">
						{{q.wenti}}
					</span>
				</div>
				
				<!-- 输入区域 -->
				<div class="chat-input-area">
					<el-input v-model="ruleForm.ask" placeholder="请输入您的问题..." @keyup.enter.native="onSubmit" clearable></el-input>
					<el-button type="primary" @click="onSubmit">发送</el-button>
				</div>
			</div>
		</div>

		<script src="../../layui/layui.js"></script>
		<script src="../../js/vue.js"></script>
		<script src="../../elementui/elementui.js"></script>
		<script src="../../js/config.js"></script>
		<script src="../../modules/config.js"></script>
		<script src="../../js/utils.js"></script>
		<script type="text/javascript">
			var app = new Vue({
				el: "#app",
				data() {
					return {
						id: "",
						ruleForm: {},
						dataList: [],
						hotQuestions: [],
						greeting: '',
						inter: null
					}
				},
				methods: {
					init(id) {
						this.id = id;
						this.getGreeting();
						this.getHotQuestions();
						this.getList();
						var that = this;
						this.inter = setInterval(function() {
							that.getList();
						}, 5000);
					},
					
					getGreeting() {
						layui.http.request('aikefuzhishiku/greeting', 'get', {}, (res) => {
							if(res.data) {
								this.greeting = res.data.replace(/\n/g, '<br>');
							}
						});
					},
					
					getHotQuestions() {
						layui.http.request('aikefuzhishiku/hotQuestions', 'get', {limit: 5}, (res) => {
							if(res.data) {
								this.hotQuestions = res.data;
							}
						});
					},
					
					getList() {
						layui.http.request('chat/list', 'get', {
							userid: localStorage.getItem('userid'),
							sort: 'addtime',
							order: 'asc'
						}, (res) => {
							this.dataList = res.data.list || [];
							this.$nextTick(() => {
								var chatContent = this.$refs.chatContent;
								if (chatContent) {
									chatContent.scrollTop = chatContent.scrollHeight;
								}
							});
						});
					},
					
					askQuestion(question) {
						this.ruleForm.ask = question;
						this.onSubmit();
					},
					
					onSubmit() {
						if (!this.ruleForm.ask || !this.ruleForm.ask.trim()) {
							layer.msg('请输入您的问题', {time: 2000, icon: 5});
							return;
						}
						
						var question = this.ruleForm.ask.trim();
						this.ruleForm.ask = '';
						
						layui.http.requestJson('chat/add', 'post', {
							userid: localStorage.getItem('userid'),
							ask: question
						}, (res) => {
							this.getList();
						});
					},
					
					transferHuman() {
						this.$confirm('确定要转接人工客服吗？', '转人工', {
							confirmButtonText: '确定',
							cancelButtonText: '取消',
							type: 'info'
						}).then(() => {
							layui.http.requestJson('chat/transferHuman', 'post', {
								content: '用户主动请求转人工客服'
							}, (res) => {
								layer.msg('已转接人工客服，请稍候', {icon: 1});
								this.getList();
							});
						}).catch(() => {});
					}
				},
				beforeDestroy() {
					if (this.inter) {
						clearInterval(this.inter);
					}
				}
			})

			layui.use(['layer', 'element', 'http', 'jquery'], function() {
				var layer = layui.layer;
				var element = layui.element;
				var http = layui.http;
				var jquery = layui.jquery;
				app.init();
			});
		</script>
	</body>
</html>
